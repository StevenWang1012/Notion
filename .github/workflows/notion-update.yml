name: Run Notion Auto Progress

on:
  schedule:
    - cron: "0 19 * * *"  # 台灣時間凌晨 03:00
  workflow_dispatch:     # 允許手動觸發

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        # 升級到 v4 以解決 Node.js 20 棄用警告
        uses: actions/checkout@v4

      - name: Set up Python
        # 升級到 v5 以解決 Node.js 20 棄用警告
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # 如果你的 requirements.txt 已經 Push 到 Repository 根目錄，這裡可以開啟快取
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 使用你選取的 requirements.txt 進行安裝
          pip install -r requirements.txt

      - name: Run main.py
        run: python main.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          PAGEID_MEETING_1: ${{ secrets.PAGEID_MEETING_1 }}
          DBID_MEETING_1: ${{ secrets.DBID_MEETING_1 }}
