name: Run Notion Auto Progress

on:
  schedule:
    - cron: "0 19 * * *"  # 台灣時間凌晨 03:00
  workflow_dispatch:     # 允許手動觸發

# 加入全域環境變數，強制讓 GitHub Actions 使用 Node.js 24 執行環境
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install notion-client pytz; fi

      - name: Run main.py
        run: python main.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          PAGEID_MEETING_1: ${{ secrets.PAGEID_MEETING_1 }}
          DBID_MEETING_1: ${{ secrets.DBID_MEETING_1 }}
